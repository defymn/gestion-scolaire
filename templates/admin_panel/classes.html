{% extends 'base_dashboard.html' %}
{% block page_title %}Class Groups{% endblock %}
{% block content %}
<div class="card"><a class="btn btn-primary" href="{% url 'admin_class_add' %}">Add Class Group</a></div>
<div class="card">
    <table class="table">
        <thead><tr><th>Name</th><th>Year</th><th>Actions</th></tr></thead>
        <tbody>
        {% for c in classes %}
        <tr>
            <td>{{ c.name }}</td>
            <td>{{ c.year }}</td>
            <td>
                <a class="btn btn-secondary" href="{% url 'admin_class_edit' c.id %}">Edit</a>
                <form method="post" action="{% url 'admin_class_delete' c.id %}" class="inline-form">
                    {% csrf_token %}
                    <button class="btn btn-danger js-delete-confirm" type="submit">Delete</button>
                </form>
            </td>
        </tr>
        {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
