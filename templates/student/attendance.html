{% extends 'base_dashboard.html' %}
{% block page_title %}My Attendance{% endblock %}
{% block content %}
<div class="card">
    <table class="table">
        <thead><tr><th>Date</th><th>Course</th><th>Status</th><th>Note</th></tr></thead>
        <tbody>
        {% for r in records %}
        <tr><td>{{ r.date }}</td><td>{{ r.course.name }}</td><td><span class="badge-{{ r.status }}">{{ r.status }}</span></td><td>{{ r.note }}</td></tr>
        {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
